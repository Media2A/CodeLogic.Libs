  <line x1="221" y1="221" x2="211" y2="211" stroke="#00f5d4" stroke-width="8" stroke-linecap="round"/>
  <line x1="291" y1="291" x2="301" y2="301" stroke="#00f5d4" stroke-width="8" stroke-linecap="round"/>
  <line x1="291" y1="221" x2="301" y2="211" stroke="#00f5d4" stroke-width="8" stroke-linecap="round"/>
  <line x1="221" y1="291" x2="211" y2="301" stroke="#00f5d4" stroke-width="8" stroke-linecap="round"/>

