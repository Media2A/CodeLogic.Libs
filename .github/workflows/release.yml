name: Build And Release

on:
  push:
    branches:
      - release
      - prerelease
  workflow_dispatch:
    inputs:
      build_all:
        description: 'Build all libraries (ignore change detection)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: codelogic-libs-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CodeLogic.Libs
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Clone CodeLogic framework dependency
        shell: bash
        run: |
          TARGET="$(dirname "$GITHUB_WORKSPACE")/CodeLogic"
          git clone --depth 1 "https://github.com/${{ github.repository_owner }}/CodeLogic.git" "$TARGET"
          echo "Cloned CodeLogic to $TARGET"

      - name: Detect changes and compute version
        id: changes
        shell: pwsh
        run: |
          $allProjects = @(
            'CL.Common', 'CL.GameNetQuery', 'CL.GitHelper', 'CL.Mail',
            'CL.MySQL2', 'CL.NetUtils', 'CL.PostgreSQL', 'CL.SQLite',
            'CL.SocialConnect', 'CL.StorageS3', 'CL.SystemStats', 'CL.TwoFactorAuth'
          )

          $buildAll = '${{ github.event.inputs.build_all }}' -eq 'true'

          # Find the last release tag to diff against (match tag pattern to branch)
          $tagPattern = if ('${{ github.ref_name }}' -eq 'prerelease') { 'libs-preview-v*' } else { 'libs-v*' }
          $lastTag = git describe --tags --abbrev=0 --match $tagPattern 2>$null

          if ($buildAll -or -not $lastTag) {
            Write-Host "Building all libraries (build_all=$buildAll, lastTag=$lastTag)"
            $changedProjects = $allProjects
          } else {
            $changedFiles = git diff --name-only "$lastTag..HEAD" 2>$null
            if (-not $changedFiles) { $changedFiles = @() }

            # If version.txt changed, rebuild all — the major.minor line moved.
            $versionFileChanged = $changedFiles | Where-Object { $_ -eq 'version.txt' }
            if ($versionFileChanged) {
              Write-Host "version.txt changed — rebuilding all libraries"
              $changedProjects = $allProjects
            } else {
              # A lib counts as "changed" if any file under its folder changed since
              # the last tag. csproj is no longer auto-bumped/committed, so there is
              # no self-cascade to exclude.
              $changedProjects = @()
              foreach ($project in $allProjects) {
                $hasRealChange = $changedFiles | Where-Object { $_ -like "$project/*" }
                if ($hasRealChange) { $changedProjects += $project }
              }

              if ($changedProjects.Count -eq 0) {
                Write-Host "No library changes since $lastTag — nothing to release"
                "has_changes=False" >> $env:GITHUB_OUTPUT
                "projects=" >> $env:GITHUB_OUTPUT
                exit 0
              }
            }
          }

          Write-Host "Changed projects: $($changedProjects -join ', ')"

          # ── Composed version: {major.minor from version.txt}.{run_number}[+sha] ──
          # Major.Minor is hand-controlled in version.txt. The GitHub run number is the
          # monotonic, NuGet-orderable patch (always higher each run). The short SHA is
          # SemVer build-metadata: nuget.org strips it from the package version, so it is
          # provenance only — it survives in the assembly InformationalVersion. Nothing is
          # written back to the repo; the version is composed at pack time via -p:Version.
          $rootVer = (Get-Content 'version.txt' -TotalCount 1).Trim()   # e.g. "4.6"
          $sha     = '${{ github.sha }}'.Substring(0, 7)
          if ('${{ github.ref_name }}' -eq 'prerelease') {
            $version = "$rootVer.${{ github.run_number }}-preview+$sha"
          } else {
            $version = "$rootVer.${{ github.run_number }}+$sha"
          }

          Write-Host "Composed version for this run: $version (all packed libs share it)"

          $projectList = $changedProjects -join ','
          "projects=$projectList" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "has_changes=$($changedProjects.Count -gt 0)" >> $env:GITHUB_OUTPUT

      - name: Restore and pack changed libraries
        if: steps.changes.outputs.has_changes == 'True'
        shell: pwsh
        run: |
          $projects = "${{ steps.changes.outputs.projects }}".Split(',')
          $version  = "${{ steps.changes.outputs.version }}"
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $versionLines = New-Object System.Collections.Generic.List[string]

          foreach ($project in $projects) {
            $csproj = Join-Path $project "$project.csproj"

            $versionLines.Add("$project=$version")

            dotnet restore $csproj /p:CodeLogicFromNuGet=true
            dotnet pack $csproj --configuration Release --no-restore --output artifacts `
              /p:PackageVersion=$version /p:Version=$version /p:InformationalVersion=$version `
              /p:CodeLogicFromNuGet=true
          }

          $versionLines | Set-Content 'artifacts/package-versions.txt'

          # NuGet normalizes PackageReference ranges to use the restored version as
          # the lower bound. For libs to keep accepting older CodeLogic versions,
          # rewrite each nupkg's .nuspec to use the literal range "[4.0.0, 5.0.0)".
          $targetRange = '[4.0.0, 5.0.0)'
          foreach ($nupkg in Get-ChildItem artifacts -Filter '*.nupkg') {
            $tmp = "$env:RUNNER_TEMP/nupkg-$([Guid]::NewGuid())"
            New-Item -ItemType Directory -Force -Path $tmp | Out-Null
            Expand-Archive $nupkg.FullName -DestinationPath $tmp -Force
            $nuspec = Get-ChildItem $tmp -Filter '*.nuspec' | Select-Object -First 1
            if (-not $nuspec) { Remove-Item $tmp -Recurse -Force; continue }
            [xml]$doc = Get-Content $nuspec.FullName
            $ns = New-Object System.Xml.XmlNamespaceManager($doc.NameTable)
            $ns.AddNamespace('n', $doc.DocumentElement.NamespaceURI)
            $deps = $doc.SelectNodes('//n:dependency[@id="CodeLogic"]', $ns)
            if ($deps.Count -gt 0) {
              foreach ($d in $deps) { $d.version = $targetRange }
              $doc.Save($nuspec.FullName)
              # Repack — zip contents (nuspec must be at root)
              Remove-Item $nupkg.FullName
              Compress-Archive -Path "$tmp/*" -DestinationPath $nupkg.FullName
              Write-Host "Rewrote CodeLogic dependency → $targetRange in $($nupkg.Name)"
            }
            Remove-Item $tmp -Recurse -Force
          }

          $timestamp = Get-Date -Format 'yyyy-MM-dd HH:mm UTC'
          @"
          ## CodeLogic.Libs release

          **Commit**: ${{ github.sha }}
          **Time**: $timestamp

          ### Package versions
          $($versionLines | ForEach-Object { "- $_" } | Out-String)
          "@ | Set-Content 'artifacts/release-notes.md'

      - name: Push to NuGet.org
        if: steps.changes.outputs.has_changes == 'True'
        run: dotnet nuget push 'artifacts/*.nupkg' --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub release
        if: steps.changes.outputs.has_changes == 'True'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name == 'prerelease' && format('libs-preview-v{0}', github.run_number) || format('libs-v{0}', github.run_number) }}
          name: ${{ github.ref_name == 'prerelease' && format('CodeLogic.Libs preview {0}', github.run_number) || format('CodeLogic.Libs release {0}', github.run_number) }}
          body_path: artifacts/release-notes.md
          prerelease: ${{ github.ref_name == 'prerelease' }}
          generate_release_notes: true
          files: |
            artifacts/*.nupkg
            artifacts/package-versions.txt

      # NOTE: this workflow no longer writes versions back to the repo.
      # The package version is composed at pack time as
      #   {major.minor from version.txt}.{github.run_number}[+short-sha]
      # via -p:Version=, so no csproj is edited and nothing is committed.
      # main and release therefore never diverge by a version-bump commit.
      #
      # Workflow:
      #   - dev pushes feature work to main (no version churn anywhere)
      #   - bump major/minor by editing version.txt when desired
      #   - to publish: merge or fast-forward main → release
      #   - this workflow fires, packs with the composed version, publishes
      #     to NuGet, and creates a GitHub release
      #
      # The git short-sha rides in SemVer build-metadata: nuget.org strips it
      # from the package version (provenance only), and it survives in each
      # assembly's InformationalVersion.
