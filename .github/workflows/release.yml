name: Build And Release

on:
  push:
    branches:
      - main
    paths:
      - 'CL.Common/**'
      - 'CL.GameNetQuery/**'
      - 'CL.GitHelper/**'
      - 'CL.Mail/**'
      - 'CL.MySQL2/**'
      - 'CL.NetUtils/**'
      - 'CL.PostgreSQL/**'
      - 'CL.SQLite/**'
      - 'CL.SocialConnect/**'
      - 'CL.StorageS3/**'
      - 'CL.SystemStats/**'
      - 'CL.TwoFactorAuth/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codelogic-libs-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CodeLogic.Libs
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CODELOGIC_REPO_TOKEN || github.token }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Clone CodeLogic framework dependency
        shell: bash
        env:
          CODELOGIC_REPO_TOKEN: ${{ secrets.CODELOGIC_REPO_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ github.token }}
        run: |
          TOKEN="${CODELOGIC_REPO_TOKEN:-$GITHUB_TOKEN_FALLBACK}"
          TARGET="$(dirname "$GITHUB_WORKSPACE")/CodeLogic"
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${{ github.repository_owner }}/CodeLogic.git" "$TARGET"
          echo "Cloned CodeLogic to $TARGET"

      - name: Detect changes and bump versions
        id: changes
        shell: pwsh
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # All library directories
          $allProjects = @(
            'CL.Common', 'CL.GameNetQuery', 'CL.GitHelper', 'CL.Mail',
            'CL.MySQL2', 'CL.NetUtils', 'CL.PostgreSQL', 'CL.SQLite',
            'CL.SocialConnect', 'CL.StorageS3', 'CL.SystemStats', 'CL.TwoFactorAuth'
          )

          # Detect which folders changed (compare HEAD vs HEAD~1)
          $changedFiles = git diff --name-only HEAD~1 HEAD 2>$null
          if (-not $changedFiles) { $changedFiles = @() }

          $changedProjects = @()
          foreach ($project in $allProjects) {
            $hasChange = $changedFiles | Where-Object { $_ -like "$project/*" }
            if ($hasChange) { $changedProjects += $project }
          }

          # workflow_dispatch or workflow file change → build all
          if ($changedProjects.Count -eq 0) {
            Write-Host "No library changes detected (or workflow trigger) — building all"
            $changedProjects = $allProjects
          }

          Write-Host "Changed projects: $($changedProjects -join ', ')"

          # Determine bump level from commit message
          $msg = $env:COMMIT_MSG
          if ($msg -match '(?i)^breaking[:\s]|BREAKING CHANGE') {
            $bump = 'major'
          } elseif ($msg -match '(?i)^feat[:\s]') {
            $bump = 'minor'
          } else {
            $bump = 'patch'
          }
          Write-Host "Bump level: $bump (from commit message)"

          # Bump versions in changed csprojs
          $versionMap = @{}
          foreach ($project in $changedProjects) {
            $csproj = Join-Path $project "$project.csproj"
            [xml]$proj = Get-Content $csproj
            $versionNode = $proj.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1
            $currentVersion = $versionNode.Version
            if ([string]::IsNullOrWhiteSpace($currentVersion)) {
              throw "Could not read <Version> from $csproj"
            }

            $parts = $currentVersion.Split('.')
            $major = [int]$parts[0]; $minor = [int]$parts[1]; $patch = [int]$parts[2]

            switch ($bump) {
              'major' { $major++; $minor = 0; $patch = 0 }
              'minor' { $minor++; $patch = 0 }
              'patch' { $patch++ }
            }

            $newVersion = "$major.$minor.$patch"
            $versionNode.Version = $newVersion
            $proj.Save((Resolve-Path $csproj).Path)

            $versionMap[$project] = $newVersion
            Write-Host "$project : $currentVersion -> $newVersion ($bump)"
          }

          # Output for next steps
          $projectList = $changedProjects -join ','
          "projects=$projectList" >> $env:GITHUB_OUTPUT
          "bump=$bump" >> $env:GITHUB_OUTPUT
          "has_changes=$($changedProjects.Count -gt 0)" >> $env:GITHUB_OUTPUT

          # Save version map for release notes
          $versionLines = $versionMap.GetEnumerator() | Sort-Object Key | ForEach-Object { "$($_.Key)=$($_.Value)" }
          $versionLines | Set-Content 'version-map.txt'

      - name: Commit version bumps
        if: steps.changes.outputs.has_changes == 'True'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "CL.*/CL.*.csproj"
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: auto-bump versions [skip ci]

          $(cat version-map.txt)"
            git push
          fi

      - name: Restore and pack changed libraries
        if: steps.changes.outputs.has_changes == 'True'
        shell: pwsh
        run: |
          $projects = "${{ steps.changes.outputs.projects }}".Split(',')
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $versionLines = New-Object System.Collections.Generic.List[string]

          foreach ($project in $projects) {
            $csproj = Join-Path $project "$project.csproj"
            [xml]$proj = Get-Content $csproj
            $version = ($proj.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version

            $versionLines.Add("$project=$version")

            dotnet restore $csproj
            dotnet pack $csproj --configuration Release --no-restore --output artifacts `
              /p:PackageVersion=$version /p:Version=$version /p:InformationalVersion=$version
          }

          $versionLines | Set-Content 'artifacts/package-versions.txt'

          $timestamp = Get-Date -Format 'yyyy-MM-dd HH:mm UTC'
          @"
          ## CodeLogic.Libs release

          **Bump**: ${{ steps.changes.outputs.bump }}
          **Commit**: ${{ github.sha }}
          **Time**: $timestamp

          ### Package versions
          $($versionLines | ForEach-Object { "- $_" } | Out-String)
          "@ | Set-Content 'artifacts/release-notes.md'

      - name: Create GitHub release
        if: steps.changes.outputs.has_changes == 'True'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libs-v${{ github.run_number }}
          name: CodeLogic.Libs (${{ steps.changes.outputs.bump }} bump)
          body_path: artifacts/release-notes.md
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.nupkg
            artifacts/package-versions.txt

  cleanup:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Delete old container image versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: fraghunt-web
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false
          token: ${{ secrets.GITHUB_TOKEN }}
