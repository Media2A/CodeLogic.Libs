name: Build And Release

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      build_all:
        description: 'Build all libraries (ignore change detection)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: codelogic-libs-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CodeLogic.Libs
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: release

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Clone CodeLogic framework dependency
        shell: bash
        run: |
          TARGET="$(dirname "$GITHUB_WORKSPACE")/CodeLogic"
          git clone --depth 1 "https://github.com/${{ github.repository_owner }}/CodeLogic.git" "$TARGET"
          echo "Cloned CodeLogic to $TARGET"

      - name: Detect changes and bump versions
        id: changes
        shell: pwsh
        run: |
          $allProjects = @(
            'CL.Common', 'CL.GameNetQuery', 'CL.GitHelper', 'CL.Mail',
            'CL.MySQL2', 'CL.NetUtils', 'CL.PostgreSQL', 'CL.SQLite',
            'CL.SocialConnect', 'CL.StorageS3', 'CL.SystemStats', 'CL.TwoFactorAuth'
          )

          $buildAll = '${{ github.event.inputs.build_all }}' -eq 'true'

          # Find the last release tag to diff against
          $lastTag = git describe --tags --abbrev=0 2>$null

          if ($buildAll -or -not $lastTag) {
            Write-Host "Building all libraries (build_all=$buildAll, lastTag=$lastTag)"
            $changedProjects = $allProjects
          } else {
            $changedFiles = git diff --name-only "$lastTag..HEAD" 2>$null
            if (-not $changedFiles) { $changedFiles = @() }

            $changedProjects = @()
            foreach ($project in $allProjects) {
              $hasChange = $changedFiles | Where-Object { $_ -like "$project/*" }
              if ($hasChange) { $changedProjects += $project }
            }

            if ($changedProjects.Count -eq 0) {
              Write-Host "No library changes since $lastTag — building all as fallback"
              $changedProjects = $allProjects
            }
          }

          Write-Host "Changed projects: $($changedProjects -join ', ')"

          # Per-library bump: scan only the commits that touched each lib's folder
          $versionMap = @{}
          $bumpSummary = @()
          foreach ($project in $changedProjects) {
            # Get commit messages that touched THIS project's folder
            if ($lastTag) {
              $projectLog = git log "$lastTag..HEAD" --format=%s -- "$project/" 2>$null
            } else {
              $projectLog = git log -10 --format=%s -- "$project/" 2>$null
            }
            $projectLogStr = ($projectLog ?? @()) -join "`n"

            # Determine bump level for THIS project
            if ($projectLogStr -match '(?i)breaking[:\s]|BREAKING CHANGE') {
              $bump = 'major'
            } elseif ($projectLogStr -match '(?i)feat[:\s]') {
              $bump = 'minor'
            } else {
              $bump = 'patch'
            }

            # Read and bump version
            $csproj = Join-Path $project "$project.csproj"
            [xml]$proj = Get-Content $csproj
            $versionNode = $proj.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1
            $currentVersion = $versionNode.Version
            if ([string]::IsNullOrWhiteSpace($currentVersion)) {
              throw "Could not read <Version> from $csproj"
            }

            $parts = $currentVersion.Split('.')
            $major = [int]$parts[0]; $minor = [int]$parts[1]; $patch = [int]$parts[2]

            switch ($bump) {
              'major' { $major++; $minor = 0; $patch = 0 }
              'minor' { $minor++; $patch = 0 }
              'patch' { $patch++ }
            }

            $newVersion = "$major.$minor.$patch"
            $versionNode.Version = $newVersion
            $proj.Save((Resolve-Path $csproj).Path)

            $versionMap[$project] = $newVersion
            $bumpSummary += "$project : $currentVersion -> $newVersion ($bump)"
            Write-Host "$project : $currentVersion -> $newVersion ($bump)"
          }

          $projectList = $changedProjects -join ','
          "projects=$projectList" >> $env:GITHUB_OUTPUT
          "has_changes=$($changedProjects.Count -gt 0)" >> $env:GITHUB_OUTPUT

          $versionLines = $versionMap.GetEnumerator() | Sort-Object Key | ForEach-Object { "$($_.Key)=$($_.Value)" }
          $versionLines | Set-Content 'version-map.txt'

      - name: Commit version bumps
        if: steps.changes.outputs.has_changes == 'True'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "CL.*/CL.*.csproj"
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: release — auto-bump versions [skip ci]

          $(cat version-map.txt)"
            git push origin release
          fi

      - name: Restore and pack changed libraries
        if: steps.changes.outputs.has_changes == 'True'
        shell: pwsh
        run: |
          $projects = "${{ steps.changes.outputs.projects }}".Split(',')
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $versionLines = New-Object System.Collections.Generic.List[string]

          foreach ($project in $projects) {
            $csproj = Join-Path $project "$project.csproj"
            [xml]$proj = Get-Content $csproj
            $version = ($proj.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version

            $versionLines.Add("$project=$version")

            dotnet restore $csproj
            dotnet pack $csproj --configuration Release --no-restore --output artifacts `
              /p:PackageVersion=$version /p:Version=$version /p:InformationalVersion=$version
          }

          $versionLines | Set-Content 'artifacts/package-versions.txt'

          $timestamp = Get-Date -Format 'yyyy-MM-dd HH:mm UTC'
          @"
          ## CodeLogic.Libs release

          **Commit**: ${{ github.sha }}
          **Time**: $timestamp

          ### Package versions
          $($versionLines | ForEach-Object { "- $_" } | Out-String)
          "@ | Set-Content 'artifacts/release-notes.md'

      - name: Push to NuGet.org
        if: steps.changes.outputs.has_changes == 'True'
        run: dotnet nuget push 'artifacts/*.nupkg' --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub release
        if: steps.changes.outputs.has_changes == 'True'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: libs-v${{ github.run_number }}
          name: CodeLogic.Libs release ${{ github.run_number }}
          body_path: artifacts/release-notes.md
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.nupkg
            artifacts/package-versions.txt

      - name: Sync version bumps back to main
        if: steps.changes.outputs.has_changes == 'True'
        shell: bash
        run: |
          git fetch origin main
          git checkout main
          git merge release --no-edit -m "chore: sync release version bumps to main [skip ci]"
          git push origin main
