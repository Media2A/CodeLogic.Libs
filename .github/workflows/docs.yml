name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'CL.Common/**'
      - 'CL.GitHelper/**'
      - 'CL.Mail/**'
      - 'CL.MySQL2/**'
      - 'CL.NetUtils/**'
      - 'CL.PostgreSQL/**'
      - 'CL.SQLite/**'
      - 'CL.SocialConnect/**'
      - 'CL.StorageS3/**'
      - 'CL.SystemStats/**'
      - 'CL.TwoFactorAuth/**'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CodeLogic.Libs
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Clone CodeLogic framework (dependency)
        run: git clone --depth 1 https://github.com/Media2A/CodeLogic.git ../../CodeLogic

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build all projects (generates XML docs)
        run: |
          for proj in CL.Common CL.GitHelper CL.Mail CL.MySQL2 CL.NetUtils CL.PostgreSQL CL.SQLite CL.SocialConnect CL.StorageS3 CL.SystemStats CL.TwoFactorAuth; do
            dotnet build $proj/$proj.csproj --configuration Release
          done

      - name: Build documentation
        run: docfx docs/docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
